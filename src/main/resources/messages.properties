# Autenticação e cadastro
error.auth.invalid-credentials=E-mail/usuário ou senha incorretos. Verifique os dados e tente novamente.
error.auth.email-already-registered=Este e-mail já está cadastrado. Use outro ou faça login.
error.auth.username-already-taken=Este nome de usuário já está em uso. Escolha outro.
error.auth.current-password-wrong=A senha atual está incorreta.
error.auth.new-password-same=A nova senha deve ser diferente da senha atual.

# Sessão e segurança (Spring Security / interceptor)
error.security.authentication-required=Autenticação necessária. Faça login para acessar este recurso.
error.session.invalid-or-expired=Sessão inválida ou expirada. Faça login novamente.
error.session.none-active=Nenhuma sessão ativa. Faça login para continuar.
error.session.binding-missing=Esta sessão não está vinculada ao dispositivo. Faça login novamente.
error.session.binding-mismatch=Sessão encerrada por segurança: ambiente ou rede alterados em relação ao login.
error.session.user-id-missing=Sessão sem usuário autenticado.

# Validação (Bean Validation + handler)
error.validation.summary=Dados inválidos.
error.validation.field-invalid=Valor inválido.
error.validation.malformed-json=Corpo da requisição inválido ou JSON malformado.

error.validation.login.required=Informe seu e-mail ou nome de usuário.
error.validation.login.size=O login deve ter no máximo {max} caracteres.
error.validation.password.required=Informe sua senha.
error.validation.password.size.login=A senha deve ter no máximo {max} caracteres.

error.validation.register.username.required=Informe um nome de usuário.
error.validation.register.username.size=O nome de usuário deve ter no máximo {max} caracteres.
error.validation.register.email.required=Informe um e-mail válido.
error.validation.register.email.format=Informe um e-mail com formato válido.
error.validation.register.password.required=Informe uma senha.
error.validation.register.password.size=A senha deve ter entre {min} e {max} caracteres.

error.validation.auth.current-password.required=Informe sua senha atual.

# Perfil
error.profile.user-not-found=Usuário não encontrado.
error.profile.not-found=Perfil não encontrado.
